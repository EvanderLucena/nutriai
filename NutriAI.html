<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>NutriAI — Painel clínico</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="viz.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="view_landing.jsx"></script>
<script type="text/babel" src="view_login.jsx"></script>
<script type="text/babel" src="view_signup.jsx"></script>
<script type="text/babel" src="view_onboarding.jsx"></script>
<script type="text/babel" src="view_home.jsx"></script>
<script type="text/babel" src="view_patients.jsx"></script>
<script type="text/babel" src="view_patient.jsx"></script>
<script type="text/babel" src="view_plans.jsx"></script>
<script type="text/babel" src="view_foods.jsx"></script>
<script type="text/babel" src="view_insights.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "patientStatus": "danger"
}/*EDITMODE-END*/;

function App() {
  const [authView, setAuthView] = React.useState("landing");
  const [isAuthenticated, setIsAuthenticated] = React.useState(false);
  const [view, setView] = React.useState("home");
  const [activePatientId, setActivePatientId] = React.useState("p1");
  const [statusFilter, setStatusFilter] = React.useState("all");
  const [patients, setPatients] = React.useState(() => PATIENTS.map(p => ({ ...p, active: true })));
  const [tweaks, setTweaks] = React.useState({ ...TWEAK_DEFAULTS });
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  const [sidebarOpen, setSidebarOpen] = React.useState(true);

  const handleLogin = () => {
    setIsAuthenticated(true);
    setAuthView(null);
    setView("home");
  };

  const handleLogout = () => {
    setIsAuthenticated(false);
    setAuthView("landing");
  };

  React.useEffect(() => {
    const mq = window.matchMedia("(max-width: 1200px)");
    const handler = (e) => setSidebarOpen(!e.matches);
    handler(mq);
    mq.addEventListener("change", handler);
    return () => mq.removeEventListener("change", handler);
  }, []);

  React.useEffect(() => {
    window._sidebarToggle = () => setSidebarOpen(o => !o);
    return () => { delete window._sidebarToggle; };
  }, []);

  React.useEffect(() => {
    try {
      const saved = localStorage.getItem("nutriai.view");
      if (saved) setView(saved);
      const savedP = localStorage.getItem("nutriai.patient");
      if (savedP) setActivePatientId(savedP);
    } catch {}
  }, []);
  React.useEffect(() => { try { localStorage.setItem("nutriai.view", view); } catch {} }, [view]);
  React.useEffect(() => { try { localStorage.setItem("nutriai.patient", activePatientId); } catch {} }, [activePatientId]);

  React.useEffect(() => {
    document.documentElement.setAttribute("data-theme", tweaks.theme || "light");
  }, [tweaks.theme]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === "__activate_edit_mode") setTweaksOpen(true);
      if (d.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", onMsg);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  const setTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [k]: v } }, "*");
  };

  const setAuthAndView = (v) => {
    if (v === 'home') {
      setIsAuthenticated(true);
      setAuthView(null);
    }
    setView(v);
  };

  if (!isAuthenticated) {
    if (authView === "landing") return <LandingView setAuthView={setAuthView} />;
    if (authView === "login") return <LoginView setAuthView={setAuthView} setView={setAuthAndView} />;
    if (authView === "signup") return <SignupView setAuthView={setAuthView} setView={setAuthAndView} />;
    if (view === "onboarding") return <OnboardingView setView={setAuthAndView} />;
    return <LandingView setAuthView={setAuthView} />;
  }

  if (view === "onboarding") return <OnboardingView setView={setAuthAndView} />;

  return (
    <div className={"app" + (sidebarOpen ? "" : " sidebar-closed")}>
      <Rail view={view} setView={setView}/>
      <Sidebar
        view={view} setView={setView}
        patients={patients}
        activePatientId={activePatientId}
        setActivePatientId={setActivePatientId}
        statusFilter={statusFilter}
        setStatusFilter={setStatusFilter}
      />
      <main className="main" key={view}>
        {view === "home" && <HomeView setView={setView} setActivePatientId={setActivePatientId} patients={patients}/>}
        {view === "patients" && <PatientsView setView={setView} setActivePatientId={setActivePatientId} patients={patients} setPatients={setPatients}/>}
        {view === "patient" && <PatientView setView={setView} overrideStatus={tweaks.patientStatus}/>}
        {view === "foods" && <FoodsView setView={setView}/>}
        {view === "insights" && <InsightsView setView={setView} setActivePatientId={setActivePatientId}/>}
      </main>

      <div className={"tweaks " + (tweaksOpen ? "open" : "")}>
        <div className="tweaks-h">
          <span className="dot"/>
          <span className="t">Tweaks</span>
          <span style={{marginLeft:'auto', fontSize:10, color:'var(--fg-subtle)', fontFamily:'var(--font-mono)'}}>AO VIVO</span>
        </div>
        <div className="tweaks-b">
          <div className="tweak-row">
            <div className="label">Tema</div>
            <div className="seg">
              <button className={tweaks.theme==="light"?"active":""} onClick={()=>setTweak("theme","light")}>Claro</button>
              <button className={tweaks.theme==="dark"?"active":""} onClick={()=>setTweak("theme","dark")}>Escuro</button>
            </div>
          </div>
          <div className="tweak-row">
            <div className="label">Paciente em foco · Ana</div>
            <div className="seg">
              <button className={tweaks.patientStatus==="ontrack"?"active":""} onClick={()=>setTweak("patientStatus","ontrack")}>On-track</button>
              <button className={tweaks.patientStatus==="warning"?"active":""} onClick={()=>setTweak("patientStatus","warning")}>Atenção</button>
              <button className={tweaks.patientStatus==="danger"?"active":""} onClick={()=>setTweak("patientStatus","danger")}>Crítico</button>
            </div>
          </div>
          <div style={{fontSize:10.5, color:'var(--fg-subtle)', lineHeight:1.5, paddingTop:4, borderTop:'1px solid var(--border)'}}>
            Altera tema global e status do paciente em foco.
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
