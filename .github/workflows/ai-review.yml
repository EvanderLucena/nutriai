name: AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ai-review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      pull-requests: write
      issues: write
      contents: read
    env:
      AI_REVIEW_PRIMARY_PROVIDER: ollama
      AI_REVIEW_PRIMARY_MODEL: glm-5-turbo
      AI_REVIEW_FALLBACK_PROVIDER: ollama
      AI_REVIEW_FALLBACK_MODEL: glm-5.1
      AI_REVIEW_CHUNK_LINES: 700
      AI_REVIEW_MAX_CHUNKS: 12
      AI_REVIEW_MAX_VISIBLE_FINDINGS: 8
      AI_REVIEW_MAX_FINDING_CHARS: 280
      AI_REVIEW_PROVIDER_MAX_TIME: 180
      AI_REVIEW_PROVIDER_RETRIES: 1

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get diff
        id: diff
        shell: bash
        run: |
          git diff --no-color origin/${{ github.base_ref }}...HEAD -- '*.java' '*.ts' '*.tsx' '*.css' '*.yml' '*.gradle' '*.sql' '*.json' '*.html' > /tmp/pr_diff.txt
          echo "lines=$(wc -l < /tmp/pr_diff.txt | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Load project rules
        shell: bash
        run: |
          if [ -f .github/review-rules.md ]; then
            cp .github/review-rules.md /tmp/review_rules.txt
          else
            printf '%s' 'No project-specific rules found.' > /tmp/review_rules.txt
          fi

      - name: Run AI review
        id: review
        if: steps.diff.outputs.lines > 0
        shell: bash
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          bash .github/scripts/ai-review.sh

      - name: Upsert sticky AI review comment
        if: steps.diff.outputs.lines > 0 && (steps.review.outputs.result == 'success' || steps.review.outputs.result == 'error')
        uses: actions/github-script@v7
        env:
          RESULT: ${{ steps.review.outputs.result }}
          REVIEW_TEXT: ${{ steps.review.outputs.review }}
          ERROR_MESSAGE: ${{ steps.review.outputs.error_message }}
          MODEL_CHAIN: ${{ steps.review.outputs.model_chain }}
          PRIMARY_PROVIDER: ${{ env.AI_REVIEW_PRIMARY_PROVIDER }}
          PRIMARY_MODEL: ${{ env.AI_REVIEW_PRIMARY_MODEL }}
          FALLBACK_PROVIDER: ${{ env.AI_REVIEW_FALLBACK_PROVIDER }}
          FALLBACK_MODEL: ${{ env.AI_REVIEW_FALLBACK_MODEL }}
          LINES: ${{ steps.review.outputs.lines }}
          REVIEWED_CHUNKS: ${{ steps.review.outputs.reviewed_chunks }}
          TOTAL_CHUNKS: ${{ steps.review.outputs.total_chunks }}
          HAD_FALLBACK: ${{ steps.review.outputs.had_fallback }}
        with:
          script: |
            const marker = '<!-- ai-review:sticky -->';
            const lines = process.env.LINES || '0';
            const reviewedChunks = process.env.REVIEWED_CHUNKS || '0';
            const totalChunks = process.env.TOTAL_CHUNKS || '0';
            const modelChain = process.env.MODEL_CHAIN || `${process.env.PRIMARY_PROVIDER}/${process.env.PRIMARY_MODEL}`;
            const metadata = [
              `- Modelo primario: \`${process.env.PRIMARY_MODEL}\` (${process.env.PRIMARY_PROVIDER})`,
              `- Fallback: \`${process.env.FALLBACK_MODEL}\` (${process.env.FALLBACK_PROVIDER})`,
              `- Modelos usados nesta execucao: ${modelChain}`,
              `- Cobertura: ${reviewedChunks}/${totalChunks} chunks, ${lines} linhas`,
              process.env.HAD_FALLBACK === 'true' ? '- Fallback acionado nesta execucao.' : null,
            ].filter(Boolean).join('\n');

            let body;
            if (process.env.RESULT === 'success') {
              body = [
                marker,
                '## AI Review',
                '',
                metadata,
                '',
                process.env.REVIEW_TEXT,
              ].join('\n');
            } else {
              body = [
                marker,
                '## AI Review',
                '',
                metadata,
                '',
                '- Status: falha de infraestrutura',
                `- Motivo: ${process.env.ERROR_MESSAGE}`,
                '- Acao recomendada: revisar logs do workflow e validar os secrets/configuracoes dos provedores antes de confiar neste resultado.',
              ].join('\n');
            }

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find(comment => comment.body && comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Dismiss previous AI reviews
        if: steps.review.outputs.result == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });

            for (const review of reviews) {
              const author = review.user?.login || '';
              const body = review.body || '';
              if (!['APPROVED', 'CHANGES_REQUESTED'].includes(review.state)) {
                continue;
              }
              if (!(author === 'github-actions[bot]' || author === 'github-actions')) {
                continue;
              }
              if (!body.startsWith('AI review')) {
                continue;
              }

              try {
                await github.rest.pulls.dismissReview({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.issue.number,
                  review_id: review.id,
                  message: 'Superseded by a newer ai-review run.',
                });
              } catch (error) {
                console.log(`Could not dismiss review ${review.id}: ${error.message}`);
              }
            }

      - name: Cleanup legacy AI review comments
        if: steps.diff.outputs.lines > 0 && (steps.review.outputs.result == 'success' || steps.review.outputs.result == 'error')
        uses: actions/github-script@v7
        with:
          script: |
            const stickyMarker = '<!-- ai-review:sticky -->';
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            for (const comment of comments) {
              const author = comment.user?.login || '';
              const body = comment.body || '';
              if (!(author === 'github-actions[bot]' || author === 'github-actions')) {
                continue;
              }
              if (body.includes(stickyMarker)) {
                continue;
              }
              if (!body.startsWith('## AI Review (')) {
                continue;
              }

              try {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              } catch (error) {
                console.log(`Could not delete legacy comment ${comment.id}: ${error.message}`);
              }
            }

      - name: Auto-approve if clean
        if: steps.review.outputs.decision == 'approve'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const author = pr.user.login;

            const { data: perms } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: author,
            });

            const isInternal = perms.permission === 'admin' || perms.permission === 'write';

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'APPROVE',
              body: isInternal
                ? 'AI review passed - no critical issues found.'
                : 'AI review passed - no critical issues found.\n\nExternal contributor: a maintainer must also approve before merging.',
            });

      - name: Approve with MEDIUM warning
        if: steps.review.outputs.decision == 'approve_with_warning'
        uses: actions/github-script@v7
        env:
          REVIEW_TEXT: ${{ steps.review.outputs.review }}
        with:
          script: |
            const review = process.env.REVIEW_TEXT;
            const summaryLine = review.split('\n').find(line => line.startsWith('SUMMARY:')) || 'SUMMARY: MEDIUM findings detectados.';
            const summary = summaryLine.replace(/^SUMMARY:\s*/, '');

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const author = pr.user.login;
            const { data: perms } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: author,
            });

            const isInternal = perms.permission === 'admin' || perms.permission === 'write';
            const body = `AI review passed with MEDIUM findings.\n\nResumo: ${summary}\n\nVeja o comentario sticky "AI Review" para detalhes.${isInternal ? '' : '\n\nExternal contributor: a maintainer must also approve before merging.'}`;

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'APPROVE',
              body,
            });

      - name: Request changes for CRITICAL/HIGH findings
        if: steps.review.outputs.decision == 'request_changes'
        uses: actions/github-script@v7
        env:
          REVIEW_TEXT: ${{ steps.review.outputs.review }}
        with:
          script: |
            const review = process.env.REVIEW_TEXT;
            const summaryLine = review.split('\n').find(line => line.startsWith('SUMMARY:')) || 'SUMMARY: Foram encontrados findings bloqueantes.';
            const summary = summaryLine.replace(/^SUMMARY:\s*/, '');
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'REQUEST_CHANGES',
              body: `AI review found blocking findings.\n\nResumo: ${summary}\n\nVeja o comentario sticky "AI Review" para detalhes completos.`,
            });

      - name: Sync HIGH+ finding issue
        if: steps.review.outputs.result == 'success'
        uses: actions/github-script@v7
        env:
          REVIEW_TEXT: ${{ steps.review.outputs.review }}
          SEVERITY: ${{ steps.review.outputs.severity }}
          MODEL_CHAIN: ${{ steps.review.outputs.model_chain }}
          REVIEWED_CHUNKS: ${{ steps.review.outputs.reviewed_chunks }}
          TOTAL_CHUNKS: ${{ steps.review.outputs.total_chunks }}
          LINES: ${{ steps.review.outputs.lines }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        with:
          script: |
            const reviewText = process.env.REVIEW_TEXT || '';
            const summaryLine = reviewText.split('\n').find(line => line.startsWith('SUMMARY:')) || 'SUMMARY: sem resumo.';
            const summary = summaryLine.replace(/^SUMMARY:\s*/, '');
            const blockerLines = reviewText.split('\n')
              .filter(line => /^- (CRITICAL|HIGH):/i.test(line.trim()));
            const maxBlockersInIssue = 10;
            const visibleBlockers = blockerLines.slice(0, maxBlockersInIssue);
            const omittedBlockers = Math.max(0, blockerLines.length - visibleBlockers.length);

            const prNum = process.env.PR_NUMBER;
            const title = `AI Review findings (HIGH+) — PR #${prNum}`;
            const body = [
              `<!-- ai-review-issue:pr-${prNum} -->`,
              `## AI Review findings from PR #${prNum}`,
              '',
              `Resumo: ${summary}`,
              '',
              'Blockers (CRITICAL/HIGH):',
              ...(visibleBlockers.length > 0 ? visibleBlockers : ['none']),
              ...(omittedBlockers > 0 ? [`... e mais ${omittedBlockers} blockers no comentario sticky do PR.`] : []),
              '',
              `- PR: ${process.env.PR_URL}`,
              `- Modelos usados: ${process.env.MODEL_CHAIN}`,
              `- Cobertura: ${process.env.REVIEWED_CHUNKS}/${process.env.TOTAL_CHUNKS} chunks, ${process.env.LINES} linhas`,
              '',
              'Auto-managed by the ai-review workflow.',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'ai-review',
              state: 'open',
              per_page: 100,
            });

            const existing = issues.find(issue => issue.title === title);
            const shouldTrack = process.env.SEVERITY === 'critical' || process.env.SEVERITY === 'high';

            if (shouldTrack) {
              if (existing) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  title,
                  body,
                });
              } else {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title,
                  body,
                  labels: ['ai-review'],
                });
              }
              return;
            }

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `High+ findings resolved or no longer present in the latest AI review for PR #${prNum}. Closing issue.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: 'closed',
              });
            }

      - name: Log AI review infrastructure error
        if: steps.review.outputs.result == 'error'
        shell: bash
        run: |
          echo "::warning::${{ steps.review.outputs.error_message }}"
