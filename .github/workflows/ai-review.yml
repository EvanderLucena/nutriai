name: AI Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Get diff
        id: diff
        run: |
          git fetch origin main
          DIFF=$(git diff origin/main...HEAD -- '*.java' '*.ts' '*.tsx' '*.css' '*.yml' '*.gradle' '*.sql' '*.json' '*.html')
          LINES=$(echo "$DIFF" | wc -l)
          echo "lines=$LINES" >> $GITHUB_OUTPUT
          {
            echo 'content<<DIFFEOF'
            echo "$DIFF"
            echo DIFFEOF
          } >> $GITHUB_OUTPUT

      - name: Select model
        id: model
        run: |
          if [ "${{ steps.diff.outputs.lines }}" -gt 1000 ]; then
            echo "name=glm-5.1" >> $GITHUB_OUTPUT
          else
            echo "name=glm-4.7-flash" >> $GITHUB_OUTPUT
          fi

      - name: Run AI review
        id: review
        if: steps.diff.outputs.lines > 0
        run: |
          PROMPT='You are a senior code reviewer for NutriAI — a Brazilian nutritionist SaaS.
          Tech stack: React 18 + TypeScript + Vite + Tailwind (frontend), Java 21 + Spring Boot + PostgreSQL (backend).
          All UI text is pt-BR. Row-level tenant isolation via nutritionistId FK.

          Review this diff for:
          1. BUGS — logic errors, null safety, race conditions, missing error handling
          2. SECURITY — missing auth checks (@PreAuthorize), injection, data leakage across tenants
          3. ARCHITECTURE — layer violations (controller→repo, view→api), circular deps, missing service layer
          4. LGPD — hardcoded PII, missing consent checks, data exposure in logs/responses
          5. REACT — hooks rules violations, missing deps in useEffect, stale closures

          Respond in this EXACT format (no markdown, no code blocks):
          STATUS: APPROVE or REQUEST_CHANGES
          SUMMARY: one-line summary in pt-BR
          FINDINGS: (list each finding as "- SEVERITY: description" or "none" if clean)
          SEVERITY is one of: CRITICAL, HIGH, MEDIUM, LOW, INFO'

          RESPONSE=$(curl -s https://ollama.com/api/chat \
            -H "Authorization: Bearer ${{ secrets.OLLAMA_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg model "${{ steps.model.outputs.name }}" \
              --arg prompt "$PROMPT" \
              --arg diff "${{ steps.diff.outputs.content }}" \
              '{
                model: $model,
                messages: [
                  {role: "system", content: $prompt},
                  {role: "user", content: ("Review this diff:\n\n" + $diff)}
                ],
                stream: false
              }'
            )")

          REVIEW=$(echo "$RESPONSE" | jq -r '.message.content // empty')

          if [ -z "$REVIEW" ]; then
            echo "AI review failed — empty response from Ollama"
            echo "result=error" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "review<<REVIEWSCRIPT"
          echo "$REVIEW"
          echo "REVIEWSCRIPT" >> $GITHUB_OUTPUT

          STATUS_LINE=$(echo "$REVIEW" | grep -i "^STATUS:" | head -1)
          if echo "$STATUS_LINE" | grep -qi "APPROVE"; then
            echo "decision=approve" >> $GITHUB_OUTPUT
          else
            echo "decision=request_changes" >> $GITHUB_OUTPUT
          fi

      - name: Post review comment
        if: steps.review.outputs.result != 'error'
        uses: actions/github-script@v7
        with:
          script: |
            const review = `${{ steps.review.outputs.review }}`;
            const model = `${{ steps.model.outputs.name }}`;
            const body = `## 🤖 AI Review (${model})\n\n${review}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });

      - name: Auto-approve if clean
        if: steps.review.outputs.decision == 'approve'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'APPROVE',
              body: '🤖 AI review passed — no critical issues found.'
            });

      - name: Request changes if issues found
        if: steps.review.outputs.decision == 'request_changes'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'REQUEST_CHANGES',
              body: '🤖 AI review found issues — please address before merging.'
            });