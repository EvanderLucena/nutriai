spring:
  application:
    name: nutriai-api

  datasource:
    url: jdbc:postgresql://localhost:5432/nutriai
    username: nutriai
    password: changeme

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

nutriai:
  version: 0.2.0
  jwt:
    secret: ${NUTRIAI_JWT_SECRET:default-dev-secret-change-in-production-must-be-at-least-256-bits-long}
    access-token-expiration: 900000    # 15 minutes in ms
    refresh-token-expiration: 604800000 # 7 days in ms
    cookie:
      name: nutriai_refresh
      path: /api/v1/auth
      max-age: 604800   # 7 days in seconds
      http-only: true
      secure: false     # true in production
      same-site: Lax    # Lax for dev (cross-port), Strict for production