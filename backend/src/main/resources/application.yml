spring:
  application:
    name: nutriai-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/nutriai}
    username: ${SPRING_DATASOURCE_USERNAME:nutriai}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

nutriai:
  version: 0.2.0
  jwt:
    secret: ${NUTRIAI_JWT_SECRET}
    access-token-expiration: 900000    # 15 minutes in ms
    refresh-token-expiration: 604800000 # 7 days in ms
    cookie:
      name: nutriai_refresh
      path: /api/v1/auth
      max-age: 604800   # 7 days in seconds
      http-only: true
      secure: false     # true in production
      same-site: Lax    # Lax for dev (cross-port), Strict for production