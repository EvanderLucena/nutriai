spring:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

nutriai:
  version: 0.2.0
  jwt:
    secret: test-secret-key-that-is-at-least-256-bits-long-for-hmac-sha-256-algorithm-minimum
    access-token-expiration: 900000
    refresh-token-expiration: 604800000
    cookie:
      name: nutriai_refresh
      path: /api/v1/auth
      max-age: 604800
      http-only: true
      secure: false
      same-site: Lax