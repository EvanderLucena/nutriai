spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

  flyway:
    enabled: false

nutriai:
  version: 0.2.0
  jwt:
    secret: test-secret-key-that-is-at-least-256-bits-long-for-hmac-sha-256-algorithm-minimum
    access-token-expiration: 900000
    refresh-token-expiration: 604800000
    cookie:
      name: nutriai_refresh
      path: /api/v1/auth
      max-age: 604800
      http-only: true
      secure: false
      same-site: Lax